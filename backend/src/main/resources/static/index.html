<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>API Minimalista</title>
</head>
<body>
    <h1>Envio de Dados</h1>
    <!-- O form envia um POST para a rota /dados -->
    <form action="/dados" method="POST">
        <label for="id">ID (Placeholder):</label>
        <input type="text" id="id" name="id" required>
        <br><br>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
