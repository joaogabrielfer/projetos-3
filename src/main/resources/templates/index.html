<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>EdenGreen Impact - Dashboard</title>
    <link rel="stylesheet" th:href="@{/style.css}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>EdenGreen Impact</h1>
            <p>Simulador de Impacto Ambiental</p>
        </header>

        <form id="impactForm">
            <div class="form-group">
                <label>Quantidade de Transações:</label>
                <input type="number" id="numeroTransacoes" required>
            </div>

            <div class="form-group">
                <label>Meio de Pagamento Atual:</label>
                <select id="tipoPagamento" required>
                    <option value="FISICO">Cartão Físico</option>
                    <option value="DIGITAL">Digital / Pix</option>
                </select>
            </div>
            <div class="form-group">
    <label>Peso do Cartão (gramas):</label>
    <input type="number" step="0.1" id="pesoMedioCartao" placeholder="Ex: 5.0">
</div>

    <header>
        <h1>EdenGreen Impact</h1>
        <p class="subtitle">Calculadora de emissões de GEE</p>
    </header>
    <div class="tipo-selecao">
        <button type="botao" class="tipo-butao active" id="btF" onclick="selecionarTipo('FISICO')">Físico</button>
        <button type="botao" class="tipo-butao" id="btD" onclick="selecionarTipo('DIGITAL')">Digital</button>
    </div>

    <form id="impactForm">
        <div class="form-group">
            <label for="numeroTransacoes">Qtd. de Transações</label>
            <input type="number" id="numeroTransacoes" placeholder="Ex: 2300">
        </div>

        <div class="form-group">
            <label for="tipoPagamento">Meio de Pagamento</label>
            <select id="tipoPagamento">
                <option value="">Selecione...</option>
                <option value="FISICO">Cartão Físico</option>
                <option value="DIGITAL">Digital / Pix</option>
            </select>
        </div>
        
        <div class="form-section" id="formDigital">
            <div class="form-group">
                <label for="tipoRede">Tipo de rede utilizada</label>
                <select id="tipoRede">
                    <option value="4G">4G</option>
                    <option value="5G">5G</option>
                    <option value="WIFI">Wi-Fi</option>
                </select>
            </div>
            <div class="form-group">
                <label for="energiaServidor">Energia do servidor</label>
                <select id="energiaServidor">
                    <option value="MISTO">Misto</option>
                    <option value="RENOVAVEL">100% renovável</option>
                    <option value="FOSSIL">Maioria fóssil</option>
                </select>
            </div>
        </div>


        <div id="resultState" class="hidden">
            <div class="resultado-principal">
                <h3>Emissão da Seleção:</h3>
                <p><span id="valorIndividual">0.00000</span> kg CO₂e</p>
            </div>

            <div class="grid-comparacao">
                <div class="card">
                    <h4>Cenário Físico</h4>
                    <p><span id="valorFisico">0.00</span> kg</p>
                </div>
                <div class="card">
                    <h4>Cenário Digital</h4>
                    <p><span id="valorDigital">0.00</span> kg</p>
                </div>
            </div>

            <div class="alerta-reducao">
                Potencial de Redução: <span id="reducaoAbs">0.00</span> kg 
                (<span id="reducaoPct">0</span>%)
            </div>

            <div class="grafico-box">
                <canvas id="impactoChart"></canvas>
            </div>
        </div>
    </div>

</main>

        
<script th:src="@{/script.js}"></script>
<script>
    function selecionarTipo(tipo) {
        document.getElementById('tipoPagamento').value = tipo;
        document.getElementById('btnFisico').classList.toggle('active', tipo === 'FISICO');
        document.getElementById('btnDigital').classList.toggle('active', tipo === 'DIGITAL');
        document.getElementById('formFisico').classList.toggle('active', tipo === 'FISICO');
        document.getElementById('formDigital').classList.toggle('active', tipo === 'DIGITAL');
    }
</script>
</body>
</html>
